name: Bug report
description: Report a reproducible problem in Open Social Dashboard
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include enough detail to reproduce it locally.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the impact.
      placeholder: The dashboard shows missing data even though collection succeeded.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps needed to trigger the issue.
      placeholder: |
        1. Run npm run collect
        2. Start the app with npm run dev
        3. Open the overview page
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The latest snapshot should appear in the overview table.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Collector
        - API
        - Dashboard UI
        - Data / SQLite
        - Build / Tooling
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, browser, and any relevant env vars.
      placeholder: macOS 15, Node 20, Chrome 134, APP_API_PORT=8790
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell

